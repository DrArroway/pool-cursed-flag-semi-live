<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algae Matrix Flag Monitor</title>
    <style>
        body {
            background-color: #111;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        #appContainer {
            max-width: 800px;
            margin: 0 auto;
        }
        #status {
            background: #222;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            color: #00ff00;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
        canvas {
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border-radius: 4px;
            display: block;
            margin-bottom: 20px;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        .btn:hover { background: #1d4ed8; }
        .btn-secondary { background: #4b5563; }
        .btn-secondary:hover { background: #374151; }

        #calibrationPanel {
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-sizing: border-box;
            text-align: left;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 13px;
            color: #a1a1aa;
            margin-bottom: 5px;
        }
        .input-group label span {
            color: #00ff00;
            font-weight: bold;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%; /* Spans the exact width of the panel/flag alignment container */
            background: #3a3a3c;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff00;
            cursor: pointer;
        }
        .url-input {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: white;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="appContainer">
    <h2>🇺🇸 Reflecting Pool Algae Density Flag Matrix</h2>
    <div id="status">Initializing system matrices...</div>
    
    <canvas id="flagCanvas" width="800" height="520"></canvas>

    <div>
        <button id="toggleCalibrateBtn" class="btn">🛠️ Open Calibration Panel</button>
    </div>

    <div id="calibrationPanel" style="display: none;">
        <h3 style="margin-top: 0; color: #00ff00; border-bottom: 1px solid #3a3a3c; padding-bottom: 8px;">🗺️ Precision Coordinate Calibration Engine</h3>
        
        <div class="input-group">
            <label>Source Live Image URL / YouTube ID: <span id="currentSource">YouTube: oDCAAfOSqvA</span></label>
            <input type="text" id="streamUrlInput" class="url-input" value="https://www.youtube.com/watch?v=oDCAAfOSqvA" placeholder="Enter full YouTube URL or raw proxy route">
        </div>

        <div class="input-group">
            <label>Box X Axis Placement (Horizontal Center): <span id="valX">49.0%</span></label>
            <input type="range" id="boxX" min="0" max="100" step="0.1" value="49.0">
        </div>
        <div class="input-group">
            <label>Box Y Axis Placement (Top Water Cutoff): <span id="valY">51.0%</span></label>
            <input type="range" id="boxY" min="0" max="100" step="0.1" value="51.0">
        </div>
        <div class="input-group">
            <label>Top Matrix Width (Canton Scale Edge): <span id="valW">3.0%</span></label>
            <input type="range" id="boxW" min="0.1" max="50" step="0.1" value="3.0">
        </div>
        <div class="input-group">
            <label>Total Column Sample Depth Height: <span id="valH">19.0%</span></label>
            <input type="range" id="boxH" min="0.1" max="100" step="0.1" value="19.0">
        </div>
        <div class="input-group">
            <label>Trapezoid Perspective Flare (Bottom Expansion Multiplier): <span id="valP">2.50x</span></label>
            <input type="range" id="boxP" min="0.5" max="5.0" step="0.05" value="2.50">
        </div>

        <label style="cursor: pointer; font-family: monospace; font-size: 13px; color: #a1a1aa;">
            <input type="checkbox" id="toggleDebug" checked> Enable Camera Frame Matrix Overlay Layer
        </label>
    </div>
</div>

<script>
const canvas = document.getElementById('flagCanvas');
const ctx = canvas.getContext('2d');
const statusDiv = document.getElementById('status');

let starBackgroundColors = Array.from({length: 50}, () => "#1a2c42");
let rawWebcamImage = null;
let activeVideoId = "oDCAAfOSqvA"; 

// High precision configuration matching your current optimal parameters
const config = { 
    x: 0.49, 
    y: 0.51, 
    w: 0.03, 
    h: 0.19, 
    p: 2.50,
    debug: false 
};

// Toggle view mechanism
document.getElementById('toggleCalibrateBtn').addEventListener('click', (e) => {
    const panel = document.getElementById('calibrationPanel');
    if (panel.style.display === 'none') {
        panel.style.display = 'block';
        config.debug = true;
        e.target.textContent = "❌ Close Calibration Panel";
        e.target.classList.add('btn-secondary');
    } else {
        panel.style.display = 'none';
        config.debug = false;
        e.target.textContent = "🛠️ Open Calibration Panel";
        e.target.classList.remove('btn-secondary');
    }
    drawFlag();
});

// Real-time Slider Matrix Handlers spanning the exact length of the interface template
const inputs = [
    { id: 'boxX', key: 'x', div: 'valX', mult: 0.01, unit: '%' },
    { id: 'boxY', key: 'y', div: 'valY', mult: 0.01, unit: '%' },
    { id: 'boxW', key: 'w', div: 'valW', mult: 0.01, unit: '%' },
    { id: 'boxH', key: 'h', div: 'valH', mult: 0.01, unit: '%' },
    { id: 'boxP', key: 'p', div: 'valP', mult: 1, unit: 'x' }
];

inputs.forEach(input => {
    document.getElementById(input.id).addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        config[input.key] = val * input.mult;
        document.getElementById(input.div).textContent = val.toFixed(input.id === 'boxP' ? 2 : 1) + input.unit;
        drawFlag();
    });
});

document.getElementById('toggleDebug').addEventListener('change', (e) => { config.debug = e.target.checked; drawFlag(); });

// URL / Live Endpoint Watcher configuration
document.getElementById('streamUrlInput').addEventListener('change', (e) => {
    const val = e.target.value.trim();
    let detectedId = val;
    
    if (val.includes('youtube.com') || val.includes('youtu.be')) {
        try {
            const urlObj = new URL(val);
            if (urlObj.searchParams.has('v')) {
                detectedId = urlObj.searchParams.get('v');
            } else {
                detectedId = urlObj.pathname.split('/').pop();
            }
        } catch(err) {}
    }
    
    activeVideoId = detectedId;
    document.getElementById('currentSource').textContent = "Target: " + detectedId;
    updateWebcamData();
});

function updateWebcamData() {
    statusDiv.textContent = "Querying frame asset from cloud proxy matrix layer...";
    const img = new Image();
    img.crossOrigin = "anonymous";
    
    // Dynamically request using our custom live image frame architecture
    img.src = `/api/live-frame?vid=${encodeURIComponent(activeVideoId)}`; 

    img.onload = function() {
        rawWebcamImage = img;
        statusDiv.textContent = "Live Feed Connected. Canton cells mapped to actual pool pixels.";
        
        const sampleCanvas = document.createElement('canvas');
        sampleCanvas.width = img.width;
        sampleCanvas.height = img.height;
        const sCtx = sampleCanvas.getContext('2d');
        sCtx.drawImage(img, 0, 0);

        starBackgroundColors = get50StarColorsFromTrapezoid(sCtx, img.width, img.height);
        drawFlag();
    };

    img.onerror = function() {
        statusDiv.textContent = "Proxy extraction boundary latency. Re-attempting pipeline handshake...";
        setTimeout(updateWebcamData, 8000);
    };
}

function get50StarColorsFromTrapezoid(sCtx, imgW, imgH) {
    const colors = [];
    const baseStartX = imgW * config.x;
    const baseStartY = imgH * config.y;
    const targetW = imgW * config.w;
    const targetH = imgH * config.h;

    for (let row = 1; row <= 9; row++) {
        const progress = (row - 1) / 8; 
        const currentRowWidth = targetW * (1 + progress * (config.p - 1));
        const widthDifference = currentRowWidth - targetW;
        const rowStartX = baseStartX - (widthDifference / 2);

        const xSpacing = currentRowWidth / 12;
        const ySpacing = targetH / 10;

        const isEvenRow = (row % 2 === 0);
        const starsInRow = isEvenRow ? 5 : 6;
        const starRowLeftEdge = rowStartX + (isEvenRow ? xSpacing * 2 : xSpacing);
        const pixelY = Math.floor(baseStartY + (row * ySpacing));

        for (let col = 0; col < starsInRow; col++) {
            const pixelX = Math.floor(starRowLeftEdge + (col * xSpacing * 2));
            const safeX = Math.max(0, Math.min(imgW - 1, pixelX));
            const safeY = Math.max(0, Math.min(imgH - 1, pixelY));

            try {
                const pixel = sCtx.getImageData(safeX, safeY, 1, 1).data;
                colors.push(`rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`);
            } catch(e) {
                colors.push("#1a2c42");
            }
        }
    }
    return colors;
}

function drawFlag() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const stripeHeight = canvas.height / 13;
    for (let i = 0; i < 13; i++) {
        ctx.fillStyle = (i % 2 === 0) ? "#b22234" : "#ffffff";
        ctx.fillRect(0, i * stripeHeight, canvas.width, stripeHeight);
    }

    const cantonWidth = canvas.width * 0.4;
    const cantonHeight = stripeHeight * 7;
    ctx.fillStyle = "#1a2c42";
    ctx.fillRect(0, 0, cantonWidth, cantonHeight);

    if (config.debug && rawWebcamImage) {
        ctx.save();
        ctx.globalAlpha = 0.75;
        ctx.drawImage(rawWebcamImage, 0, 0, cantonWidth, cantonHeight);
        ctx.restore();
    }

    if (rawWebcamImage) {
        const sampleCanvas = document.createElement('canvas');
        sampleCanvas.width = rawWebcamImage.width;
        sampleCanvas.height = rawWebcamImage.height;
        const sCtx = sampleCanvas.getContext('2d');
        sCtx.drawImage(rawWebcamImage, 0, 0);
        starBackgroundColors = get50StarColorsFromTrapezoid(sCtx, rawWebcamImage.width, rawWebcamImage.height);
    }

    const xSpacing = cantonWidth / 12;
    const ySpacing = cantonHeight / 10;
    let starIndex = 0;

    for (let row = 1; row <= 9; row++) {
        const isEvenRow = (row % 2 === 0);
        const starsInRow = isEvenRow ? 5 : 6;
        const startX = isEvenRow ? xSpacing * 2 : xSpacing;

        for (let col = 0; col < starsInRow; col++) {
            const x = startX + (col * xSpacing * 2);
            const y = row * ySpacing;
            const starBgColor = starBackgroundColors[starIndex] || "#1a2c42";
            starIndex++;

            ctx.fillStyle = starBgColor;
            ctx.fillRect(x - 10, y - 10, 20, 20);

            if (config.debug) {
                ctx.save();
                ctx.strokeStyle = "#ff0000";
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(x - 5, y); ctx.lineTo(x + 5, y); ctx.moveTo(x, y - 5); ctx.lineTo(x, y + 5); ctx.stroke();
                ctx.restore();
            }
        }
    }

    // Draw Interactive Green Trapezoid Visual Overlay 
    if (config.debug) {
        ctx.save();
        ctx.strokeStyle = "#00ff00";
        ctx.lineWidth = 2;
        
        const tlX = cantonWidth * config.x;
        const trX = tlX + (cantonWidth * config.w);
        const topY = cantonHeight * config.y;
        
        const bottomW = (cantonWidth * config.w) * config.p;
        const wDiff = bottomW - (cantonWidth * config.w);
        const blX = tlX - (wDiff / 2);
        const brX = blX + bottomW;
        const bottomY = topY + (cantonWidth * config.h); // proportional mapping bound

        ctx.beginPath();
        ctx.moveTo(tlX, topY); ctx.lineTo(trX, topY); ctx.lineTo(brX, bottomY); ctx.lineTo(blX, bottomY);
        ctx.closePath(); ctx.stroke();
        ctx.restore();
    }
}

updateWebcamData();
setInterval(updateWebcamData, 60000);
</script>
</body>
</html>
