<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic US Flag - D.C. Reflecting Pool Tracker</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            color: #fff;
            flex-direction: column;
        }
        canvas {
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 90vw;
            max-height: 80vh;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <canvas id="flagCanvas" width="1900" height="1000"></canvas>
    <div id="status">Connecting live feed to D.C. Reflecting Pool webcam...</div>

<script>
const canvas = document.getElementById('flagCanvas');
const ctx = canvas.getContext('2d');
const statusDiv = document.getElementById('status');

// Precise coordinates matching EarthCam's high-angle Washington Monument video feed frame
const poolCorners = {
    topLeft:     { x: 440, y: 580 },
    topRight:    { x: 560, y: 580 },
    bottomRight: { x: 820, y: 920 },
    bottomLeft:  { x: 180, y: 920 }
};
let DEBUG_CALIBRATION = true; // Set to false when you want to hide the raw image/crosshairs
let rawWebcamImage = null;    // Stores the image object for drawing later

let starBackgroundColors = Array(50).fill("#002147"); 

function updateWebcamData() {
    statusDiv.textContent = "Analyzing live video feed for algae density...";
    
    const img = new Image();
    img.crossOrigin = "anonymous"; 
    img.src = "/api/live-frame";

    img.onload = function() {
        // Save the image globally so our drawing loop can look at it for debugging
        rawWebcamImage = img; 

        const sampleCanvas = document.createElement('canvas');
        sampleCanvas.width = img.width;
        sampleCanvas.height = img.height;
        const sCtx = sampleCanvas.getContext('2d');
        sCtx.drawImage(img, 0, 0);

        starBackgroundColors = get50StarColors(sCtx, img.width, img.height);
        statusDiv.textContent = "Live Feed Connected. Canton cells mapped to actual pool pixels.";
        requestAnimationFrame(drawFlag);
    };

    img.onerror = function() {
        statusDiv.textContent = "Stream frame extraction latency. Re-attempting visual sync...";
        starBackgroundColors = Array.from({length: 50}, (_, i) => {
            const algaeMix = Math.sin(i * 0.7) > 0.1;
            return algaeMix ? `rgb(${45 + Math.floor(Math.random()*15)}, ${65 + Math.floor(Math.random()*20)}, 40)` : "#1a2c42";
        });
        requestAnimationFrame(drawFlag);
    };
}

function get50StarColors(sCtx, imgWidth, imgHeight) {
    const colors = [];
    const rows = 9;

    const scaleX = imgWidth / 1000; 
    const scaleY = imgHeight / 1000; 

    for (let r = 0; r < rows; r++) {
        const cols = (r % 2 === 0) ? 6 : 5;
        const yPct = r / (rows - 1);

        for (let c = 0; c < cols; c++) {
            const xPct = c / (cols - 1);

            // Bilinear Interpolation to grab specific grid cells directly out of the pool shape
            const leftX  = (poolCorners.topLeft.x  + yPct * (poolCorners.bottomLeft.x  - poolCorners.topLeft.x)) * scaleX;
            const rightX = (poolCorners.topRight.x + yPct * (poolCorners.bottomRight.x - poolCorners.topRight.x)) * scaleX;
            const targetX = leftX + xPct * (rightX - leftX);

            const targetY = (poolCorners.topLeft.y + yPct * (poolCorners.bottomLeft.y - poolCorners.topLeft.y)) * scaleY;

            try {
                // Read a 12x12 sample of actual liquid texture to account for ripples
                const imgData = sCtx.getImageData(targetX - 6, targetY - 6, 12, 12).data;
                let rSum = 0, gSum = 0, bSum = 0, total = imgData.length / 4;

                for (let i = 0; i < imgData.length; i += 4) {
                    rSum += imgData[i];
                    gSum += imgData[i+1];
                    bSum += imgData[i+2];
                }
                
                // Enhance the green spectrum channel slightly to highlight physical organic buildup
                let finalR = Math.floor(rSum/total);
                let finalG = Math.floor(gSum/total);
                let finalB = Math.floor(bSum/total);
                
                colors.push(`rgb(${finalR}, ${finalG}, ${finalB})`);
            } catch (e) {
                colors.push("#002147"); 
            }
        }
    }
    return colors;
}

function drawFlag() {
    // 1. Draw your base stripes normally...
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const stripeHeight = canvas.height / 13;
    for (let i = 0; i < 13; i++) {
        ctx.fillStyle = (i % 2 === 0) ? "#b22234" : "#ffffff";
        ctx.fillRect(0, i * stripeHeight, canvas.width, i * stripeHeight + stripeHeight);
    }

    // 2. Draw your Canton (the blue/green star box)
    const cantonWidth = canvas.width * 0.4;
    const cantonHeight = stripeHeight * 7;
    ctx.fillStyle = "#1a2c42"; // Base background
    ctx.fillRect(0, 0, cantonWidth, cantonHeight);

    // 3. DRAW DEBUG CALIBRATION UNDERLAY
    if (DEBUG_CALIBRATION && rawWebcamImage) {
        ctx.save();
        ctx.globalAlpha = 0.65; // Make it semi-transparent so you can see your lines overlapping
        // Fit the raw webcam image exactly inside the boundaries of your Canton box
        ctx.drawImage(rawWebcamImage, 0, 0, cantonWidth, cantonHeight);
        ctx.restore();
    }

    // 4. Render your 50 stars
    const xSpacing = cantonWidth / 12;
    const ySpacing = cantonHeight / 10;
    let starIndex = 0;

    for (let row = 1; row <= 9; row++) {
        const isEvenRow = (row % 2 === 0);
        const starsInRow = isEvenRow ? 5 : 6;
        const startX = isEvenRow ? xSpacing * 2 : xSpacing;

        for (let col = 0; col < starsInRow; col++) {
            const x = startX + (col * (isEvenRow ? xSpacing * 2 : xSpacing * 2));
            const y = row * ySpacing;

            // Grab the color generated by your bilinear sampler matrix
            const starBgColor = starBackgroundColors[starIndex] || "#1a2c42";
            starIndex++;

            // Draw the individual star bounding container box
            ctx.fillStyle = starBgColor;
            // You can draw your star shapes or sample tiles here...

            // DRAW DEBUG TARGET CROSSHAIRS
            if (DEBUG_CALIBRATION) {
                ctx.save();
                ctx.strokeStyle = "#ff0000"; // High-visibility laser red
                ctx.lineWidth = 1.5;
                
                // Draw a small crosshair target right on the center pixel being sampled
                ctx.beginPath();
                ctx.moveTo(x - 5, y); ctx.lineTo(x + 5, y);
                ctx.moveTo(x, y - 5); ctx.lineTo(x, y + 5);
                ctx.stroke();
                ctx.restore();
            }
        }
    }
}

function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
    let rot = Math.PI / 2 * 3;
    let x = cx;
    let y = cy;
    let step = Math.PI / spikes;

    ctx.beginPath();
    ctx.moveTo(cx, cy - outerRadius);
    for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        ctx.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        ctx.lineTo(x, y);
        rot += step;
    }
    ctx.lineTo(cx, cy - outerRadius);
    ctx.closePath();
    ctx.fillStyle = '#FFFFFF'; 
    ctx.fill();
}

updateWebcamData();
setInterval(updateWebcamData, 300000);
</script>

</body>
</html>
